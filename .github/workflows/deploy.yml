name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SMARN_SERVER_SSH_KEY }}" > ~/.ssh/smarn_deploy_key
          chmod 600 ~/.ssh/smarn_deploy_key

      - name: Deploy over SSH
        run: |
          ssh \
            -i ~/.ssh/smarn_deploy_key \
            -p "${{ secrets.SMARN_SERVER_PORT }}" \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SMARN_SERVER_USER }}@${{ secrets.SMARN_SERVER_HOST }}" \
            "cd '${{ secrets.SMARN_APP_DIR }}' && bash scripts/deploy.sh"
