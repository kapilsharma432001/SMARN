services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: smarn
      POSTGRES_USER: smarn
      POSTGRES_PASSWORD: smarn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarn -d smarn"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://smarn:smarn@db:5432/smarn
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_DIMENSIONS: 1536
      MEMORY_SEARCH_LIMIT: 5
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn smarn.main:create_app --factory --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
